name: Deploy Zazŭ

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/bot/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/bot:latest,ghcr.io/${{ github.repository }}/bot:${{ github.ref_name }}

      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard:latest,ghcr.io/${{ github.repository }}/dashboard:${{ github.ref_name }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /root/zazu

            # Login to GHCR to pull private images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin


            # Write production .env from secrets
            cat > /root/zazu/.env.tmp << 'ENVEOF'
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NAU_SERVICE_KEY=${{ secrets.NAU_SERVICE_KEY }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_TELEGRAM_ID=5109114390
            DATABASE_USER=postgres
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME=zazu
            BOT_DOMAIN=zazu.9nau.com
            CERT_RESOLVER=letsencrypt
            TAG=latest
            ENVEOF
            tr -d '\r' < /root/zazu/.env.tmp > /root/zazu/.env

            cd /root/zazu
            # Prevent disk space issues by cleaning up unused docker objects
            docker system prune -f
            
            docker compose pull
            docker compose up -d --remove-orphans
