services:
  db:
    image: postgres:16-alpine
    container_name: zazu-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zazu}
    networks:
      - shared-mesh
    volumes:
      - db-data:/var/lib/postgresql/data
    # Bunker Mode: No ports mapped, no Traefik labels, 100% internal.

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: zazu-bot
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-zazu}?schema=public
    depends_on:
      - db
    networks:
      - shared-mesh
    labels:
      - "traefik.enable=true"
      # Zazŭ answers to this domain via Traefik (gateway)
      - "traefik.http.routers.zazu-bot.rule=Host(`${BOT_DOMAIN:-zazu.9nau.com}`)"
      - "traefik.http.routers.zazu-bot.entrypoints=websecure"
      - "traefik.http.routers.zazu-bot.tls.certresolver=${CERT_RESOLVER:-letencrypt}"
      - "traefik.http.services.zazu-bot.loadbalancer.server.port=3000"
      - "traefik.docker.network=shared-mesh"

networks:
  shared-mesh:
    external: true

volumes:
  db-data:
