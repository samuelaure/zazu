services:
  zazu_db:
    image: postgres:16-alpine
    container_name: zazu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-zazu}
    networks:
      - nau-network
    volumes:
      - db-data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 192M

  bot:
    image: ghcr.io/samuelaure/zazu/bot:${TAG:-latest}
    container_name: zazu
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NAU_SERVICE_KEY: ${NAU_SERVICE_KEY}
      NAUTHENTICITY_URL: ${NAUTHENTICITY_URL}
      NAU_API_URL: ${NAU_API_URL:-http://9nau-api:3000}
      BOT_DOMAIN: ${BOT_DOMAIN:-zazu.9nau.com}
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@zazu_db:5432/${DATABASE_NAME:-zazu}?schema=public
    depends_on:
      - zazu_db
    networks:
      - nau-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 192M

  dashboard:
    image: ghcr.io/samuelaure/zazu/dashboard:${TAG:-latest}
    container_name: zazu-dashboard
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@zazu_db:5432/${DATABASE_NAME:-zazu}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      NAU_SERVICE_KEY: ${NAU_SERVICE_KEY}
      NAUTHENTICITY_URL: http://nauthenticity:3000
      NAU_API_URL: ${NAU_API_URL:-http://9nau-api:3000}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${BOT_DOMAIN:-zazu.9nau.com}
    depends_on:
      - zazu_db
    networks:
      - nau-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zazu-dashboard-secure.rule=Host(`${BOT_DOMAIN:-zazu.9nau.com}`)"
      - "traefik.http.routers.zazu-dashboard-secure.entrypoints=websecure"
      - "traefik.http.routers.zazu-dashboard-secure.tls=true"
      - "traefik.http.routers.zazu-dashboard-secure.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.zazu-dashboard.loadbalancer.server.port=3000"
      - "traefik.docker.network=nau-network"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 192M

networks:
  nau-network:
    external: true

volumes:
  db-data:
