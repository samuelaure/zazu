services:
  db:
    image: postgres:16-alpine
    container_name: zazu-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zazu}
    networks:
      - shared-mesh
    volumes:
      - db-data:/var/lib/postgresql/data

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: zazu-bot
    restart: always
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-zazu}?schema=public
    depends_on:
      - db
    networks:
      - shared-mesh

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: zazu-dashboard
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-zazu}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: https://${BOT_DOMAIN:-zazu.9nau.com}
    depends_on:
      - db
    networks:
      - shared-mesh
    ports:
      - "3001:3000"
    labels:
      - "traefik.enable=true"
      # HTTPS Router
      - "traefik.http.routers.zazu-dashboard-secure.rule=Host(`${BOT_DOMAIN:-zazu.9nau.com}`)"
      - "traefik.http.routers.zazu-dashboard-secure.entrypoints=websecure"
      - "traefik.http.routers.zazu-dashboard-secure.tls=true"
      - "traefik.http.routers.zazu-dashboard-secure.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      # HTTP Router (Fallback for Local)
      - "traefik.http.routers.zazu-dashboard.rule=Host(`${BOT_DOMAIN:-zazu.9nau.com}`)"
      - "traefik.http.routers.zazu-dashboard.entrypoints=web"
      - "traefik.http.services.zazu-dashboard.loadbalancer.server.port=3000"
      - "traefik.docker.network=shared-mesh"

networks:
  shared-mesh:
    external: true

volumes:
  db-data:
